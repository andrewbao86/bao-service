version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node --version
        - npm --version
        # npm install (not npm ci) — lockfile optional platform deps differ on Linux vs Windows
        - npm install --include=optional --no-audit --no-fund
    build:
      commands:
        - npm run build:amplify
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
